name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: type-check + lint + unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Python worker: unit tests (mocked, no API keys needed)
  # ---------------------------------------------------------------------------
  pipeline:
    name: Pipeline (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Run unit tests (scrapers + embed server + daily cap)
        run: pytest tests/scrapers/ tests/test_embed_server.py tests/pipeline/test_daily_cap.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Pipeline accuracy tests (requires API keys — only on main)
  # ---------------------------------------------------------------------------
  pipeline-accuracy:
    name: Pipeline accuracy (requires API keys)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: worker

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CELERY_BROKER_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Run accuracy tests (categorizer — requires API keys)
        run: pytest tests/pipeline/test_categorizer.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker build (validates Dockerfile without pushing)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build worker image
        run: docker build -t ai-news-worker:ci ./worker
